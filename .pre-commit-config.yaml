repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies:
          - transformers>=5.5,<6
          - torch>=2.11,<3
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: python
        additional_dependencies:
          - coverage[toml]>=7.10,<8
          - pytest>=8.4,<9
          - pytest-cov>=7,<8
          - torch>=2.11,<3
          - transformers>=5.5,<6
        pass_filenames: false
